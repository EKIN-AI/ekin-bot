---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: antigravity-bot
  namespace: shared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: antigravity-bot
  template:
    metadata:
      labels:
        app: antigravity-bot
    spec:
      initContainers:
      - name: fix-mtu
        image: alpine
        command: ["sh", "-c", "ip link set dev eth0 mtu 1400"]
        securityContext:
          privileged: true
      containers:
      - name: orchestrator
        image: antigravity-bot:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: telegram-bot-secret
              key: TELEGRAM_BOT_TOKEN
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              name: telegram-bot-secret
              key: GH_TOKEN
        - name: GH_ORG
          value: "Ekin-AI"
        - name: ALLOWED_USER_ID
          value: "PLACEHOLDER_ID"
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "10m"
            memory: "64Mi"
